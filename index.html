<style>

  header{background:var(--blue);color:#fff}
  .head-in{width:min(740px,100%);margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .head-in h1{margin:0;font-size:20px;letter-spacing:-.02em}
  .head-in p{margin:3px 0 0;font-size:13.5px;opacity:.92}
  .pdflink{flex:0 0 auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);
    color:#fff;border-radius:11px;padding:9px 13px;font-size:13.5px;font-weight:700;cursor:pointer}

  .searchwrap{position:sticky;top:0;z-index:25;background:var(--bg);padding:13px 0 7px}
  .search input{width:100%;min-height:62px;border:3px solid var(--blue);border-radius:18px;
    padding:0 18px;font-size:20px;background:#fff;box-shadow:0 6px 18px rgba(31,111,235,.12)}
  .search input:focus{outline:5px solid rgba(31,111,235,.22)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin:6px 0 2px;font-size:14px;color:var(--sub)}
  .legend .dot{display:inline-flex;align-items:center;gap:6px;font-weight:700}
  .legend .sw{width:13px;height:13px;border-radius:4px;display:inline-block}
  .legend .cheap{margin-left:auto;font-weight:700;color:var(--good)}
  .legend .cheap .sw{background:var(--good-bg);border:2px solid var(--good)}

  .navtitle{margin:18px 2px 8px;font-size:15px;color:var(--sub);font-weight:700}
  .nav{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .nav button{min-height:56px;border:2px solid var(--line);background:#fff;color:var(--ink);
    border-radius:15px;font-size:16px;font-weight:800;cursor:pointer;padding:0 8px;
    display:flex;align-items:center;justify-content:center;line-height:1.2}
  .nav button .n{font-size:12.5px;color:var(--sub);font-weight:700;margin-left:6px}
  .nav button.on{background:var(--blue);color:#fff;border-color:var(--blue)} .nav button.on .n{color:rgba(255,255,255,.85)}
  .nav button.flag{border-color:#f0bdb6;color:var(--bad)}
  .nav button.flag.on{background:var(--bad);color:#fff;border-color:var(--bad)} .nav button.flag.on .n{color:rgba(255,255,255,.85)}
  .nav button.all{grid-column:1/-1;background:var(--soft)}.nav button.all.on{background:var(--blue);color:#fff}

  .cat{margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .cat h3{margin:0;font-size:19px;letter-spacing:-.02em}
  .cat .count{font-size:13.5px;color:var(--sub)}
  .cat::before{content:"";width:7px;height:22px;border-radius:4px;background:var(--blue);flex:0 0 auto}

  /* 상품 카드 = 3사 비교가 핵심 */
  .item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 15px;margin-bottom:11px;box-shadow:0 3px 10px rgba(20,32,46,.04)}
  .item-name{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .item-name h4{margin:0;font-size:18.5px;letter-spacing:-.02em}
  .item-name .sz{font-size:13.5px;color:var(--sub);flex:0 0 auto}
  .flagdot{display:inline-block;font-size:12px;font-weight:800;color:#fff;background:var(--bad);
    border-radius:999px;padding:2px 8px;margin-left:6px;vertical-align:middle}

  .verdict{margin:9px 0 11px;font-size:15px;font-weight:800;color:var(--good);
    background:var(--good-bg);border-radius:11px;padding:9px 12px;display:flex;gap:8px;align-items:center}
  .verdict.same{color:#1d4ed8;background:#eaf1ff}
  .verdict.mine-bad{color:var(--bad);background:var(--bad-bg)}

  .stores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .store{border:1px solid var(--line);border-radius:13px;padding:10px 8px;text-align:center;position:relative;background:var(--soft)}

  .store.cheap .amt{color:var(--good)}
  .store.na{background:#f4f6f8} .store.na .amt{font-size:14px;color:#9aa7b6;font-weight:700;margin-top:6px}
  .store .badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    font-size:11px;font-weight:800;color:#fff;background:var(--good);border-radius:999px;padding:2px 8px;white-space:nowrap}

  /* 우리 매점가 (선택) */
  .mine{margin-top:10px;display:flex;align-items:center;gap:10px;border-top:1px dashed var(--line);padding-top:11px}
  .mine .lab{font-size:14px;color:var(--sub);font-weight:700;flex:0 0 auto}
  .mine .box{flex:1;border:2px solid var(--blue);border-radius:12px;padding:9px 12px;cursor:pointer;

  .mine .box .v{font-size:18px;font-weight:800}
  .mine .box .v.todo{color:var(--blue);font-size:15px}
  .mine .box .v.over{color:var(--bad)} .mine .box .v.ok{color:var(--good)}
  .mine .box .tap{font-size:12.5px;color:var(--blue);font-weight:700}

  .empty{padding:30px 18px;text-align:center;color:var(--sub);background:#fff;
    border:1px dashed var(--line);border-radius:var(--radius);font-size:16px}

  .backtop{position:fixed;right:16px;bottom:18px;z-index:40;background:var(--blue);color:#fff;
    border:0;border-radius:999px;min-height:52px;padding:0 20px;font-size:15px;font-weight:800;
    cursor:pointer;box-shadow:0 8px 20px rgba(31,111,235,.3)}

  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#13202f;color:#fff;
    padding:12px 19px;border-radius:999px;font-weight:700;z-index:60;opacity:0;pointer-events:none;
    transition:.22s;max-width:90%;text-align:center;font-size:15px}
  .toast.show{opacity:1}

  .print{display:none}
  @media print{
    body{background:#fff}
    header,.searchwrap,.legend,.navtitle,.nav,.cat,.grid,.backtop,.toast{display:none!important}
    .wrap{padding:0;width:100%}
    .print{display:block!important;font-family:"Noto Sans KR",sans-serif;color:#111}
    .print h1{font-size:20px;margin:0 0 4px}
    .print .sub{font-size:12px;color:#444;margin-bottom:12px}

    .nav{grid-template-columns:1fr 1fr 1fr}
  }
</style>

  <div id="empty" class="empty" style="display:none">찾는 상품이 없어요. 더 짧게 입력해 보세요.</div>
</main>

  let mine = {};
  try { mine = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}") || {}; } catch(e){ mine = {}; }

  const won = n => (Number(n)||0).toLocaleString("ko-KR") + "원";
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
  function norm(s){ return String(s||"").replace(/\s/g,"").toLowerCase(); }
  function isFlag(it){ return FLAGGED.has(it.n); }

  function storeVals(it){ return { cu:it.cu, gs:it.gs, se:it.se }; }
  function available(it){ // [{k,v}] for stores that carry it
    const v=storeVals(it); const out=[];
    for(const k of ["cu","gs","se"]) if(v[k]!=null) out.push({k, v:v[k]});
    return out;
  }
  function minPrice(it){ const a=available(it).map(x=>x.v); return a.length?Math.min(...a):null; }
  function maxPrice(it){ const a=available(it).map(x=>x.v); return a.length?Math.max(...a):null; }
  function allSame(it){ const a=available(it).map(x=>x.v); return a.length>0 && new Set(a).size===1; }

  function minePrice(it){ const v=mine[it.i]; return (v==null||v==="")?null:Number(v); }

  // 3사 비교 한 줄 평
  function verdictText(it){
    const av = available(it);
    if(!av.length) return {cls:"same", txt:"세 곳 모두 미취급"};
    const mn = minPrice(it), mx = maxPrice(it);
    if(allSame(it)){
      const naCount = 3 - av.length;
      const base = `세 곳 모두 ${won(mn)} · 동일`;
      return {cls:"same", txt: naCount? `${won(mn)} · 취급점 동일` : base};
    }
    const cheapest = av.filter(x=>x.v===mn).map(x=>STORE_LABEL[x.k]);
    return {cls:"", txt:`${cheapest.join("·")}가 가장 쌈 (${won(mn)}) · 최대 ${won(mx)}`};
  }

  function storeCellHtml(it, k, mn){
    const v = storeVals(it)[k];
    if(v==null){
      return `<div class="store na ${STORE_CLASS[k]}"><div class="who">${STORE_LABEL[k]}</div><div class="amt">미취급</div></div>`;
    }
    const cheap = (v===mn && available(it).length>1 && !allSame(it));
    return `<div class="store ${STORE_CLASS[k]} ${cheap?'cheap':''}">${cheap?`<span class="badge">최저가</span>`:``}<div class="who">${STORE_LABEL[k]}</div><div class="amt">${won(v)}</div></div>`;
  }

  function mineHtml(it){
    const mp = minePrice(it);
    const mn = minPrice(it);
    let cls="todo", txt=`<span class="v todo">눌러서 입력</span><span class="tap">선택</span>`;
    if(mp!=null){
      if(mn!=null && mp>mn){ cls="over"; txt=`<span class="v over">${won(mp)}</span><span class="tap" style="color:var(--bad)">편의점보다 높음</span>`; }
      else { cls="ok"; txt=`<span class="v ok">${won(mp)}</span><span class="tap" style="color:var(--good)">적정</span>`; }
    }
    return `<div class="mine"><span class="lab">우리 매점</span>
      <div class="box ${mp!=null?'has':''}" data-edit="${it.i}" role="button" tabindex="0" aria-label="${esc(it.n)} 매점 가격 입력">${txt}</div></div>`;
  }

  function itemHtml(it){
    const mn = minPrice(it);
    const v = verdictText(it);
    // 우리 매점가가 편의점 최저가보다 높으면 평가 줄도 빨갛게 덮어쓰기
    const mp = minePrice(it);
    let vcls = v.cls, vtxt = v.txt;
    if(mp!=null && mn!=null && mp>mn){ vcls="mine-bad"; vtxt = `우리 매점이 편의점보다 비쌈 (우리 ${won(mp)} / 편의점 최저 ${won(mn)})`; }
    return `
    <article class="item" data-id="${it.i}">
      <div class="item-name">
        <h4>${esc(it.n)}${isFlag(it)?`<span class="flagdot">공문</span>`:``}</h4>

      </div>
      <div class="verdict ${vcls}">${esc(vtxt)}</div>
      <div class="stores">
        ${storeCellHtml(it,"cu",mn)}
        ${storeCellHtml(it,"gs",mn)}
        ${storeCellHtml(it,"se",mn)}
      </div>
      ${mineHtml(it)}
    </article>`;
  }

  let view = { mode:"home", cat:"", text:"" };

  function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2200); }

  function visibleItems(){
    if(view.mode==="search"){ const t=norm(view.text); return CATALOG.filter(it=>norm(it.n+it.c+it.s).includes(t)); }
    if(view.mode==="cat") return CATALOG.filter(it=>it.c===view.cat);
    if(view.mode==="flag") return CATALOG.filter(isFlag);
    return CATALOG.filter(isFlag); // home

  function buildNav(){
    let h="";

    for(const cat of CAT_ORDER){
      h += `<button data-go="cat" data-cat="${esc(cat)}" type="button">${esc(cat)}<span class="n">${CATALOG.filter(x=>x.c===cat).length}</span></button>`;
    }
    $("nav").innerHTML=h;
  }
  function syncNav(){
    document.querySelectorAll("#nav button").forEach(b=>{
      const go=b.getAttribute("data-go"); let on=false;
      if(go==="home") on=(view.mode==="home");
      else if(go==="flag") on=(view.mode==="flag");
      else if(go==="cat") on=(view.mode==="cat" && view.cat===b.getAttribute("data-cat"));
      b.classList.toggle("on", on);
    });
  }

    else if(view.mode==="home") $("navtitle").textContent="분류를 누르세요";
    else if(view.mode==="flag") $("navtitle").textContent="공문에서 지적된 품목";
    else $("navtitle").textContent=view.cat;

    let html="";
    if(view.mode==="search"||view.mode==="flag"){
      for(const cat of CAT_ORDER){
        const its=items.filter(x=>x.c===cat); if(!its.length) continue;
        html += `<div class="cat"><h3>${esc(cat)}</h3><span class="count">${its.length}개</span></div><div class="grid">${its.map(itemHtml).join("")}</div>`;
      }
    } else if(view.mode==="cat"){
      html += `<div class="cat"><h3>${esc(view.cat)}</h3><span class="count">${items.length}개</span></div><div class="grid">${items.map(itemHtml).join("")}</div>`;
    } else {
      html += `<div class="cat"><h3>먼저 확인할 품목</h3><span class="count">${items.length}개</span></div><div class="grid">${items.map(itemHtml).join("")}</div>`;
    }
    $("list").innerHTML=html;
    $("empty").style.display=items.length?"none":"block";
    syncNav();
  }

  function editPrice(id){
    const it=CATALOG.find(x=>x.i===id); if(!it) return;
    const mn=minPrice(it);
    const cur=mine[it.i] ?? "";
    const hint = mn!=null ? `편의점 최저가: ${won(mn)}` : `편의점 미취급 품목`;
    const input=prompt(`${it.n} (${it.s||""})\n${hint}\n\n우리 매점 판매 가격을 숫자로 적어 주세요.`, cur);
    if(input===null) return;
    const c=String(input).replace(/[^0-9]/g,"");
    if(c===""){ delete mine[it.i]; persist(); render(); toast("매점 가격을 비웠습니다."); return; }
    mine[it.i]=Number(c); persist(); render();
    const mp=Number(c);
    toast((mn!=null&&mp>mn)?"편의점보다 높습니다.":"저장했습니다.");
  }

  function buildPrint(){
    const now=new Date();
    const stamp=now.toLocaleString("ko-KR",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
    // PDF는 전체 3사 비교표(현재 보고 있는 목록 기준). 매점가 입력분은 함께 표기.
    const items=visibleItems();
    const scope = view.mode==="home"?"공문 품목":view.mode==="flag"?"공문 품목":view.mode==="search"?`검색: ${view.text}`:view.cat;
    let rows="";
    let curCat="";
    for(const cat of CAT_ORDER){
      const its=items.filter(x=>x.c===cat); if(!its.length) continue;
      rows += `<tr class="cat-row"><td colspan="6">${esc(cat)}</td></tr>`;
      for(const it of its){
        const mn=minPrice(it);
        const cell=(v)=> v==null?`<td>-</td>`:`<td class="${(v===mn&&!allSame(it)&&available(it).length>1)?'cheap':''}">${won(v)}</td>`;
        const mp=minePrice(it);
        const mineTd = mp==null?`<td>-</td>`:`<td class="${(mn!=null&&mp>mn)?'over':''}">${won(mp)}</td>`;
        rows += `<tr><td class="name">${esc(it.n)} ${esc(it.s||"")}</td>${cell(it.cu)}${cell(it.gs)}${cell(it.se)}<td>${mn!=null?won(mn):"-"}</td>${mineTd}</tr>`;
      }
    }
    const body = rows
      ? `<table><thead><tr><th>품목</th><th>CU</th><th>GS25</th><th>세븐</th><th>최저가</th><th>우리매점</th></tr></thead><tbody>${rows}</tbody></table>
         <div class="foot">※ 편의점 가격은 CU·GS25·세븐일레븐 정상 판매가격 기준 참고값입니다. 행사가격(1+1·2+1)·용량·점포 차이가 있을 수 있습니다. 초록=가장 싼 곳, 빨강=우리 매점이 더 비쌈.</div>`
      : `<p style="font-size:13px">표시할 품목이 없습니다.</p>`;
    $("print").innerHTML=`<h1>편의점 3사 가격 비교표</h1><div class="sub">작성일: ${esc(stamp)} · 범위: ${esc(scope)} · ${items.length}개 품목</div>${body}`;
  }
  function printPdf(){ buildPrint(); setTimeout(()=>window.print(),60); }

  // 이벤트
  let typingTimer;
  $("q").addEventListener("input", e=>{
    clearTimeout(typingTimer);
    typingTimer=setTimeout(()=>{ const t=e.target.value.trim();
      view = t? {mode:"search",cat:"",text:t} : {mode:"home",cat:"",text:""}; render(); },120);
  });
  $("nav").addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b) return; $("q").value="";
    const go=b.getAttribute("data-go");
    if(go==="home") view={mode:"home",cat:"",text:""};
    else if(go==="flag") view={mode:"flag",cat:"",text:""};
    else if(go==="cat") view={mode:"cat",cat:b.getAttribute("data-cat"),text:""};
    render(); window.scrollTo({top:0,behavior:"smooth"});
  });
  $("topBtn").addEventListener("click", ()=>window.scrollTo({top:0,behavior:"smooth"}));
  $("pdfBtn").addEventListener("click", printPdf);
  document.addEventListener("click", e=>{ const ed=e.target.closest("[data-edit]"); if(ed) editPrice(ed.getAttribute("data-edit")); });
  document.addEventListener("keydown", e=>{
    const t=e.target;
    if((e.key==="Enter"||e.key===" ") && t.classList && t.classList.contains("box") && t.hasAttribute("data-edit")){
      e.preventDefault(); editPrice(t.getAttribute("data-edit"));
    }
  });

  buildNav();
  render();
})();
</script>
</body>
</html>
